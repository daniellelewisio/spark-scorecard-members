function Radar({ scores }) {
  // Wider viewBox + horizontal padding so "Keep Going" / "Audience" never clip.
  const W = 360, H = 300, cx = W/2, cy = 150, R = 88;
  const n = FORCES.length;
  const pt = (i,r) => { const a=-Math.PI/2+(i*2*Math.PI)/n; return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; };
  const rings=[1,2,3,4,5];
  const dataPts = FORCES.map((f,i)=>pt(i,(R*(scores[f.key]||0))/5));
  const dataStr = dataPts.map(p=>p.join(",")).join(" ");
  return (
    <svg viewBox={"0 0 "+W+" "+H} width="100%" style={{maxWidth:360,display:"block",margin:"0 auto"}}>
      {rings.map(ring=>{
        const poly=FORCES.map((_,i)=>pt(i,(R*ring)/5).join(",")).join(" ");
        return <polygon key={ring} points={poly} fill="none" stroke={C.ink} strokeOpacity={0.12} strokeWidth="1"/>;
      })}
      {FORCES.map((_,i)=>{const[x,y]=pt(i,R);return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke={C.ink} strokeOpacity={0.12} strokeWidth="1"/>;})}
      <polygon points={dataStr} fill={C.rose} fillOpacity={0.34} stroke={C.rose} strokeWidth="2.5"/>
      {dataPts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r="3.5" fill={C.rose}/>)}
      {FORCES.map((f,i)=>{
        const[x,y]=pt(i,R+20);
        const anchor = Math.abs(x-cx)<6 ? "middle" : (x<cx ? "end":"start");
        return <text key={f.key} x={x} y={y} textAnchor={anchor} dominantBaseline="middle"
          style={{font:"600 11px ui-sans-serif, system-ui",fill:C.ink,letterSpacing:"0.01em"}}>{f.key}</text>;
      })}
    </svg>
  );
}

function Btn({children,onClick,disabled,kind="solid",full}) {
  const base={font:"700 14px ui-sans-serif, system-ui",letterSpacing:"0.04em",textTransform:"uppercase",padding:"15px 26px",border:"2px solid "+C.ink,cursor:disabled?"not-allowed":"pointer",width:full?"100%":"auto",transition:"transform .12s ease, background .2s ease",opacity:disabled?0.4:1,borderRadius:0};
  const styles = kind==="solid" ? {...base,background:C.ink,color:C.paper} : {...base,background:"transparent",color:C.ink};
  return <button style={styles} onClick={onClick} disabled={disabled}
    onMouseDown={e=>!disabled&&(e.currentTarget.style.transform="translateY(1px)")}
    onMouseUp={e=>(e.currentTarget.style.transform="translateY(0)")}
    onMouseLeave={e=>(e.currentTarget.style.transform="translateY(0)")}>{children}</button>;
}

  const f = FORCES.find(x=>x.key===forceKey);

  return (
    <div style={{border:"2px solid "+(big?C.rose:C.ink),background:big?C.roseWash:"#fff",padding:"22px 24px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6,flexWrap:"wrap",gap:8}}>
        <span style={{font:"700 10px ui-sans-serif, system-ui",letterSpacing:"0.2em",textTransform:"uppercase",color:"#a85f5f"}}>{rank}</span>
        <span style={{font:"700 13px ui-sans-serif, system-ui",color:C.muted}}>{score.toFixed(1)} / 5</span>

  const forceScore=(key)=>{const a=answers[key];if(!a||a.some(x=>x==null))return null;return a.reduce((s,x)=>s+x,0)/a.length;};

  const allAnswered=FORCES.every(f=>{const a=answers[f.key];return a&&a.length===4&&a.every(x=>x!=null);});
  const ranked=useMemo(()=>[...FORCES].map(f=>({key:f.key,score:forceScore(f.key)!=null?forceScore(f.key):5})).sort((a,b)=>a.score-b.score),[answers]);
  const primary=ranked[0]&&ranked[0].key, secondary=ranked[1]&&ranked[1].key;
  const setRating=(fk,idx,val)=>setAnswers(prev=>{const cur=prev[fk]?[...prev[fk]]:[null,null,null,null];cur[idx]=val;return{...prev,[fk]:cur};});
  const curForce=FORCES[step];
  const curComplete=(answers[curForce&&curForce.key]||[]).filter(x=>x!=null).length===4;

  async function submitLead(){
    // Build the lead. `primary` is the weakest force = the tag we send.
    const payload = {
      email: email,
      name: name,
      tag: primary,            // weakest force, e.g. Revenue. Zapier adds this as the tag
      secondaryForce: secondary,
      scores: scores,
      source: "CEO Scorecard",
    };

    // Show the result either way; the email send happens in the background so a
    // slow or failed webhook never traps the person on the form.
    setSending(true);
    try {
      if (ZAPIER_WEBHOOK_URL && ZAPIER_WEBHOOK_URL.indexOf("http") === 0) {
        await fetch(ZAPIER_WEBHOOK_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(payload),
        });
      } else {
        console.log("LEAD (no webhook set yet) →", payload);
      }
    } catch (e) {
      console.warn("Lead webhook failed, showing result anyway:", e);
    }
    setSending(false);
    setSubmitted(true);
    // Meta pixel: this is the key conversion (email captured). Fire the standard
    // Lead event so Brad can optimise ad delivery toward it, plus a custom
    // completed event with the weakest force for breakdowns.
    try {
      if (window.fbq) {
        window.fbq("track", "Lead", { content_name: "CEO Scorecard", content_category: primary });
      }
      if (window.sparkTrack) {
        window.sparkTrack("ScorecardCompleted", { weakestForce: primary });
      }
    } catch (e) {}
    setStage("result");
  }

  const wrap={background:C.paper,color:C.ink,minHeight:600,borderRadius:4,overflow:"hidden",border:"1px solid "+C.ink};
  const pad={padding:"clamp(24px,5vw,52px)"};

  return (
    <div style={wrap}>
      <div ref={topRef}></div>
      <div style={{background:C.ink,padding:"16px clamp(24px,5vw,52px)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <img src={LOGO} alt="SPARK" style={{height:26,display:"block"}}/>
        <span style={{font:"600 10px ui-sans-serif, system-ui",letterSpacing:"0.22em",textTransform:"uppercase",color:C.roseSoft}}>CEO Scorecard</span>
      </div>

      {stage==="intro" && (
        <div style={pad}>
          <Eyebrow>How is your business, really?</Eyebrow>
          <h1 style={{font:"800 clamp(34px,6vw,52px)/1.02 ui-sans-serif, system-ui",letterSpacing:"-0.02em",margin:"0 0 20px"}}>
            Find the one force<br/>holding your<br/>
            <span style={{background:C.rose,color:C.white,padding:"0 10px"}}>business back.</span>
          </h1>
          <p style={{font:"400 17px/1.6 ui-sans-serif, system-ui",color:C.muted,maxWidth:520,margin:"0 0 12px"}}>
            Five forces run every business. Rate each one honestly and the Scorecard shows you the two that are limiting your growth right now, and exactly where to focus this quarter.
          </p>
          <p style={{font:"400 15px/1.6 ui-sans-serif, system-ui",color:C.muted,maxWidth:520,margin:"0 0 8px"}}>Takes about two minutes. Go with your instinct, don't overthink it.</p><p style={{font:"400 14px/1.6 ui-sans-serif, system-ui",color:C.muted,maxWidth:520,margin:"0 0 32px"}}>First we'll point you back to your <strong style={{color:C.ink}}>Endgame</strong> (where you're heading), then the forces to focus on to get there.</p>
          <Btn onClick={()=>setStage("door")}>Start the Scorecard →</Btn>
        </div>
      )}

      {stage==="door" && (
        <div style={pad}>
          <Eyebrow>One quick thing</Eyebrow>
          <h2 style={{font:"800 clamp(26px,4vw,36px)/1.1 ui-sans-serif, system-ui",letterSpacing:"-0.01em",margin:"0 0 28px",maxWidth:520}}>Are you already inside SPARK?</h2>
          <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
            <Btn kind="outline" onClick={()=>{window.location.href="https://sparkbusiness.global/ceo-scorecard-members";}}>Yes, I'm a member</Btn>
            <Btn kind="outline" onClick={()=>{setIsMember(false);setStage("quiz"); if(window.sparkTrack) window.sparkTrack("ScorecardStarted");}}>Not yet</Btn>
          </div>
          <p style={{font:"400 14px/1.6 ui-sans-serif, system-ui",color:C.muted,marginTop:28,maxWidth:480}}>Members go straight to their result and the hub to focus on. If you're not a member yet, we'll send your full result to your inbox.</p>
        </div>
      )}

      {stage==="quiz" && curForce && (
        <div style={pad}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
            <Eyebrow>{"Force "+(step+1)+" of "+FORCES.length}</Eyebrow>
            <span style={{font:"700 12px ui-sans-serif, system-ui",color:C.muted}}>{curForce.key}</span>
          </div>
          <div style={{display:"flex",gap:4,marginBottom:26}}>
            {FORCES.map((f,i)=><div key={f.key} style={{flex:1,height:4,background:i<=step?C.rose:C.roseWash}}></div>)}
          </div>
          <h2 style={{font:"800 clamp(28px,4.5vw,40px)/1.05 ui-sans-serif, system-ui",letterSpacing:"-0.01em",margin:"0 0 6px"}}>{curForce.key}</h2>
          <p style={{font:"400 16px/1.5 ui-sans-serif, system-ui",color:C.muted,margin:"0 0 28px",maxWidth:520}}>{curForce.tagline}</p>
          {curForce.statements.map((s,idx)=>{
            const val=(answers[curForce.key]||[])[idx];
            return (
              <div key={idx} style={{marginBottom:22,paddingBottom:22,borderBottom:"1px solid "+C.cream}}>
                <p style={{font:"500 16px/1.4 ui-sans-serif, system-ui",margin:"0 0 12px"}}>{s}</p>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {SCALE.map(sc=>{
                    const active=val===sc.v;
                    return <button key={sc.v} onClick={()=>setRating(curForce.key,idx,sc.v)} title={sc.label}
                      style={{flex:"1 1 auto",minWidth:58,padding:"10px 8px",cursor:"pointer",border:"1.5px solid "+(active?C.ink:"#d8d2ca"),background:active?C.ink:"#fff",color:active?C.paper:C.muted,borderRadius:0,transition:"all .12s ease",font:"700 13px ui-sans-serif, system-ui"}}>
                      <div style={{fontSize:16}}>{sc.v}</div>
                      <div style={{fontSize:9,fontWeight:600,letterSpacing:"0.04em",textTransform:"uppercase",marginTop:2}}>{sc.label}</div>
                    </button>;
                  })}
                </div>
              </div>
            );
          })}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8,gap:12,flexWrap:"wrap"}}>
            <Btn kind="outline" onClick={()=>(step===0?setStage("door"):setStep(step-1))}>← Back</Btn>
            {step<FORCES.length-1
              ? <Btn onClick={()=>setStep(step+1)} disabled={!curComplete}>Next force →</Btn>
              : <Btn onClick={()=>setStage(isMember?"result":"gate")} disabled={!allAnswered}>See my result →</Btn>}
          </div>
        </div>
      )}

      {stage==="gate" && (
        <div style={pad}>
          <Eyebrow>Your result is ready</Eyebrow>
          <h2 style={{font:"800 clamp(26px,4.2vw,38px)/1.08 ui-sans-serif, system-ui",letterSpacing:"-0.01em",margin:"0 0 16px",maxWidth:520}}>Where should we send your Scorecard?</h2>
          <p style={{font:"400 16px/1.6 ui-sans-serif, system-ui",color:C.muted,maxWidth:480,margin:"0 0 28px"}}>We'll email your two focus areas and what to do about each, plus the occasional note to help you build a business that runs without running you.</p>
          <div style={{maxWidth:440}}>
            <input style={inputStyle} value={name} onChange={e=>setName(e.target.value)} placeholder="First name"/>
            <input style={inputStyle} value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email address" type="email"/>
            <div style={{marginTop:8}}><Btn full onClick={submitLead} disabled={sending||!email.includes("@")||name.trim().length<1}>{sending?"Sending…":"Show my result →"}</Btn></div>
            <p style={{font:"400 12px/1.5 ui-sans-serif, system-ui",color:C.muted,marginTop:14}}>No spam. Unsubscribe anytime.</p>
          </div>
        </div>
      )}

      {stage==="result" && (
        <div style={pad}>
          <Eyebrow>{isMember?"Your focus this quarter":"Your Scorecard result"}</Eyebrow>
          <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr)",gap:24}}>
            <Radar scores={scores}/>
            <div style={{background:C.ink,color:C.paper,padding:"22px 24px"}}>
              <div style={{font:"700 10px ui-sans-serif, system-ui",letterSpacing:"0.22em",textTransform:"uppercase",color:C.roseSoft,marginBottom:8}}>Step one &middot; Your Endgame</div>
              <p style={{font:"400 15px/1.55 ui-sans-serif, system-ui",margin:0,color:C.cream}}>Before you touch any force, get clear on where you're heading. Endgame is the fixed star. Set it once and revisit it now and then. Everything below is how you move toward it, one season at a time.</p>
            </div>
            <div style={{font:"700 10px ui-sans-serif, system-ui",letterSpacing:"0.22em",textTransform:"uppercase",color:C.rose,margin:"4px 0 -8px"}}>Step two &middot; This season's focus</div>
            <ForceResult rank="Primary focus" forceKey={primary} score={scores[primary]} big showActions={!isMember}/>
            <ForceResult rank="And right behind it" forceKey={secondary} score={scores[secondary]} showActions={!isMember}/>
            <div style={{borderTop:"2px solid "+C.ink,paddingTop:22}}>
              <p style={{font:"400 15px/1.6 ui-sans-serif, system-ui",color:C.muted,margin:"0 0 18px"}}>
                {isMember
                  ? "These two are your wheel this season. Focus here, then re-run the Scorecard next quarter, the constraint moves as you grow. That's the work, and it never really ends."
                  : "Those actions will move the needle this week. Inside SPARK there's a whole hub for each force that goes deeper than any checklist can, plus a quarterly rhythm that walks you through whichever one is limiting you right now."}
              </p>
              {isMember
                ? <Btn onClick={()=>alert("(Demo) Route the member to the "+primary+" hub.")}>{"Go to the "+primary+" hub →"}</Btn>
                : <Btn onClick={()=>window.open("https://sparkbusiness.global/spark-ceo-hub","_blank")}>See how SPARK fixes this →</Btn>}
            </div>
            <p style={{font:"600 16px/1.5 ui-sans-serif, system-ui",color:C.ink,textAlign:"center",margin:"8px 0 0"}}>
              In case no one else tells you today , <br/>
              <span style={{background:C.rose,color:C.white,padding:"0 8px"}}>you're doing an amazing job.</span>
            </p>
            {!isMember && submitted && <p style={{font:"400 12px/1.5 ui-sans-serif, system-ui",color:C.muted,textAlign:"center",margin:0}}>A copy is on its way to {email}.</p>}
            <button onClick={()=>{setStage("intro");setStep(0);setAnswers({});setEmail("");setName("");setSubmitted(false);setIsMember(null);}}
              style={{background:"none",border:"none",color:C.muted,textDecoration:"underline",cursor:"pointer",font:"500 13px ui-sans-serif, system-ui",marginTop:4}}>Start over</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
  // Auto-height reporter: tells the parent page exactly how tall the tool's
  // content is, so the Squarespace iframe resizes to fit with no clipping and
  // no extra blank space.
  (function () {
    var last = 0;
    function measure() {
      // Measure the TRUE full content height. Take the largest of several
      // signals so a vertically-centred or flex layout can never under-report
      // (which previously caused the iframe to clip on mobile).
      var b = document.body, d = document.documentElement;
      var candidates = [
        b.scrollHeight, b.offsetHeight,
        d.scrollHeight, d.offsetHeight, d.clientHeight
      ];
      var root = document.getElementById("root");
      if (root) {
        candidates.push(root.scrollHeight);
        candidates.push(root.getBoundingClientRect().bottom);
      }
      return Math.ceil(Math.max.apply(null, candidates));
    }
    function postHeight() {
      var h = measure();
      if (h && h !== last && window.parent) {
        last = h;
        window.parent.postMessage({ sparkScorecardHeight: h }, "*");
      }
    }
    window.addEventListener("load", postHeight);
    window.addEventListener("resize", postHeight);
    var mo = new MutationObserver(postHeight);
    mo.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true });
    var ticks = 0, t = setInterval(function () { postHeight(); if (++ticks > 20) clearInterval(t); }, 250);
  })();
</script>
</body>
</html>
